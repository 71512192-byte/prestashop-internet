services:
  # 1. El servidor web de PrestaShop
  - type: web
    name: mi-prestashop-web
    env: docker
    plan: free
    envVars:
      - key: DB_SERVER
        value: localhost
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: prestashop
      - key: DB_NAME
        value: prestashop
      - key: PS_DEV_MODE
        value: "1"
